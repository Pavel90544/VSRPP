name: CI - Weather Informer

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('lab5/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Download dependencies
        working-directory: ./lab5
        run: go mod download
      
      - name: Run tests
        working-directory: ./lab5
        run: |
          go test -v -cover ./...
          go test -coverprofile=coverage.out ./...
      
      - name: Display coverage
        working-directory: ./lab5
        run: go tool cover -func=coverage.out
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lab5/coverage.out

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        working-directory: ./lab5
        run: go build -o weather-app ./cmd/linux/cli/main.go
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: weather-app
          path: lab5/weather-app
