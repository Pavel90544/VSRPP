name: Quick Check

on:
  push:
    branches: [ feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  quick:
    name: Quick Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run tests (no race)
        run: |
          cd lab5
          go test -short -v ./...
      
      - name: Build
        run: |
          cd lab5
          go build -o /dev/null ./cmd/linux/cli/main.go
