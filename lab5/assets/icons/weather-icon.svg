  <!-- Градиент -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Солнце -->
  <circle cx="300" cy="380" r="120" fill="#FFC107"/>
  
  <!-- Солнечные лучи -->
  <line x1="300" y1="200" x2="300" y2="150" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="300" y1="560" x2="300" y2="610" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="180" y1="380" x2="130" y2="380" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="420" y1="380" x2="470" y2="380" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="215" y1="235" x2="180" y2="200" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="385" y1="525" x2="420" y2="560" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="385" y1="235" x2="420" y2="200" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  <line x1="215" y1="525" x2="180" y2="560" stroke="#FFC107" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Облако -->
  <path d="M 550 450 Q 550 380 620 380 Q 690 380 690 450 Q 750 450 750 510 Q 750 570 680 570 L 560 570 Q 500 570 500 510 Q 500 450 550 450 Z" fill="#FFFFFF"/>
  
  <!-- Капли дождя -->
  <ellipse cx="580" cy="650" rx="8" ry="15" fill="#64B5F6"/>
  <ellipse cx="630" cy="670" rx="8" ry="15" fill="#64B5F6"/>
  <ellipse cx="680" cy="650" rx="8" ry="15" fill="#64B5F6"/>
  
  <!-- Текст -->
  <text x="512" y="800" font-size="80" text-anchor="middle" fill="white" font-family="Helvetica, Arial" font-weight="bold">Погода</text>
